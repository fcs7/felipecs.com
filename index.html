<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Felipe CS</title>
  <meta name="description" content="Portal pessoal de Felipe CS — acesso rápido a aplicações self-hosted.">
  <meta property="og:title" content="Felipe CS">
  <meta property="og:description" content="Portal pessoal com links para aplicações self-hosted.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://felipecs.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600&display=swap">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="noise" aria-hidden="true"></div>

  <header class="header">
    <h1 class="header__name">Felipe CS</h1>
    <p class="header__tagline">Aplicações &amp; Ferramentas</p>
  </header>

  <main class="main">
    <div class="cards-grid">

      <a class="card" href="https://app.felipecs.com" rel="noopener noreferrer">
        <svg class="card__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 5h12M9 3v2m1.048 3.5A18.24 18.24 0 0 1 3 21m1.2-6.4c1.8 2 4.2 3.4 6.8 3.4 4.97 0 9-4.03 9-9a8.96 8.96 0 0 0-2.2-5.9"/>
          <path d="m21 3-4.35 4.35M21 3h-4M21 3v4"/>
        </svg>
        <span class="card__title">Translate-PHP</span>
      </a>

      <a class="card" href="https://webmail.felipecs.com" rel="noopener noreferrer">
        <svg class="card__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
        </svg>
        <span class="card__title">E-Mail</span>
      </a>

      <a class="card" href="https://felipecs.com/nextcloud" rel="noopener noreferrer">
        <svg class="card__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M6.5 19a4.5 4.5 0 0 1-.42-8.98 7 7 0 0 1 13.84 0A4.5 4.5 0 0 1 17.5 19H6.5Z"/>
        </svg>
        <span class="card__title">Nextcloud</span>
      </a>

    </div>
  </main>

  <footer class="footer">
    <p>&copy; Felipe CS</p>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
